<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Mood</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.emoji-container {
  font-size: 40px;
  text-align: center;
}

.emoji {
  margin: 10px;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin: 10px 0;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #38bdf8;
  color: black;
}

.active {
  background: #22c55e !important;
}
.heatmap {
  display: grid;
  grid-template-columns: repeat(13, 1fr);
  gap: 4px;
  margin-top: 10px;
}

.day {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 3px;
}

.level-0 { background: #1e293b; }
.level-1 { background: #7f1d1d; }
.level-2 { background: #b45309; }
.level-3 { background: #64748b; }
.level-4 { background: #22c55e; }
.level-5 { background: #15803d; }
</style>
</head>

<body>

<div class="container">

<h1>How was today?</h1>

<div class="emoji-container">
  <span class="emoji" onclick="selectMood('😩',1)">😩</span>
  <span class="emoji" onclick="selectMood('😕',2)">😕</span>
  <span class="emoji" onclick="selectMood('😐',3)">😐</span>
  <span class="emoji" onclick="selectMood('🙂',4)">🙂</span>
  <span class="emoji" onclick="selectMood('😄',5)">😄</span>
</div>

<div class="card">
  <p>Extras</p>
  <button id="workoutBtn" onclick="toggleTag('workout')">🏋️ Workout</button>
  <button id="rehabBtn" onclick="toggleTag('rehab')">🦵 Rehab</button>
</div>

<div class="card" id="message"></div>

<div class="card" id="streak"></div>

<div class="card" id="averages"></div>

<div class="card" id="insights"></div>

<canvas id="chart"></canvas>
<div class="card">
  <h3>Last 90 Days</h3>
  <div id="heatmap" class="heatmap"></div>
</div>

</div>

<script>

let selectedMood = null;
let selectedScore = null;

let tags = {
  workout: false,
  rehab: false
};

function getData() {
  return JSON.parse(localStorage.getItem('moodData')) || {};
}

function saveData(data) {
  localStorage.setItem('moodData', JSON.stringify(data));
}

function selectMood(emoji, score) {
  selectedMood = emoji;
  selectedScore = score;
  saveEntry();
}

function toggleTag(tag) {
  tags[tag] = !tags[tag];

  document.getElementById(tag + "Btn").classList.toggle("active");
}

function saveEntry() {
  const today = new Date().toISOString().split('T')[0];
  let data = getData();

  data[today] = {
    emoji: selectedMood,
    score: selectedScore,
    workout: tags.workout,
    rehab: tags.rehab
  };

  saveData(data);

  document.getElementById("message").innerText =
    `Saved ${selectedMood} ${tags.workout ? '🏋️' : ''} ${tags.rehab ? '🦵' : ''}`;

  updateDashboard();
}

function updateDashboard() {
  let data = getData();
  let dates = Object.keys(data).sort();

  // 🔥 STREAK
  let streak = 0;
  let d = new Date();

  while (true) {
    let ds = d.toISOString().split('T')[0];
    if (data[ds]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }

  document.getElementById("streak").innerText = `🔥 Streak: ${streak} days`;
renderChart();
renderHeatmap();
  // 📊 Averages
  function avg(days) {
    let now = new Date();
    let total = 0, count = 0;

    for (let k in data) {
      let diff = (now - new Date(k)) / (1000*60*60*24);
      if (diff <= days) {
        total += data[k].score;
        count++;
      }
    }
    return count ? (total/count).toFixed(2) : "-";
  }

  document.getElementById("averages").innerHTML =
    `7d: ${avg(7)} | 30d: ${avg(30)} | 365d: ${avg(365)}`;

  // 🧠 Insights
  let workoutScores = [];
  let noWorkoutScores = [];
  let rehabScores = [];
  let noRehabScores = [];

  for (let k in data) {
    let d = data[k];

    if (d.workout) workoutScores.push(d.score);
    else noWorkoutScores.push(d.score);

    if (d.rehab) rehabScores.push(d.score);
    else noRehabScores.push(d.score);
  }

  function avgArr(arr) {
    return arr.length ? arr.reduce((a,b)=>a+b)/arr.length : 0;
  }

  let insightText = "";

  if (workoutScores.length > 3) {
    let diff = avgArr(workoutScores) - avgArr(noWorkoutScores);
    insightText += `🏋️ Workout impact: ${diff.toFixed(2)}<br>`;
  }

  if (rehabScores.length > 3) {
    let diff = avgArr(rehabScores) - avgArr(noRehabScores);
    insightText += `🦵 Rehab impact: ${diff.toFixed(2)}<br>`;
  }

  document.getElementById("insights").innerHTML = insightText || "Log more data for insights";

  renderChart();
}

function renderChart() {
  let data = getData();
  let dates = Object.keys(data).sort();

  let labels = dates.slice(-30);
  let scores = labels.map(d => data[d].score);

  const ctx = document.getElementById('chart').getContext('2d');

  if (window.chart) window.chart.destroy();

  window.chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Mood',
        data: scores,
        tension: 0.3
      }]
    },
    options: {
      scales: {
        y: {
          min: 1,
          max: 5,
          ticks: { stepSize: 1 }
        }
      }
    }
  });
}

updateDashboard();
function renderHeatmap() {
  const container = document.getElementById("heatmap");
  container.innerHTML = "";

  let data = getData();

  let today = new Date();

  for (let i = 89; i >= 0; i--) {
    let d = new Date();
    d.setDate(today.getDate() - i);

    let key = d.toISOString().split('T')[0];

    let div = document.createElement("div");
    div.classList.add("day");

    if (data[key]) {
      div.classList.add("level-" + data[key].score);
      div.title = `${key} ${data[key].emoji}`;
    } else {
      div.classList.add("level-0");
      div.title = `${key} no entry`;
    }

    container.appendChild(div);
  }
}
</script>

</body>
</html>
